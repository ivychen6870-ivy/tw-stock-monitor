name: 台股盤中即時更新

on:
  schedule:
    # 台灣時間 10:00 與 12:00 各一次
    # UTC 02:00 / 04:00 對應 台灣時間 10:00 / 12:00
    - cron: "0 2,4 * * 1-5"
  workflow_dispatch: {}   # 允許手動觸發，方便測試

jobs:
  intraday:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 簽出 repo
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install requests pandas

      - name: 執行盤中即時更新
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py intraday

      - name: 把最新即時價格存回 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/latest.csv
          git diff --staged --quiet || git commit -m "盤中即時更新 $(date +%Y-%m-%d' '%H:%M)"
          git pull --rebase origin main
          git push
