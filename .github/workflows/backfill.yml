name: 一次性回補歷史K線資料

on:
  workflow_dispatch: {}   # 只能手動觸發，不會自動排程執行

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 簽出 repo
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install requests pandas

      - name: 執行回補程式
        run: python backfill_history.py

      - name: 把回補資料存回 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/history.json
          git diff --staged --quiet || git commit -m "回補過去半年歷史K線資料"
          git pull --rebase origin main
          git push
