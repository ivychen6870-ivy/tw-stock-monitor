name: 台股盤中即時更新
on:
  schedule:
    # 台灣時間 09:00~13:55，每15分鐘一次
    # UTC 01:00~05:55 對應 台灣時間 09:00~13:55
    #
    # ⚠️ 原本設定5分鐘一次，實測發現GitHub Actions排程在高頻率下會嚴重delay
    # （曾經觀察到兩次執行間隔超過1小時，而非預期的5分鐘），這是GitHub平台
    # 對免費/公開repo高頻排程的已知限制，改成15分鐘一次來換取穩定性
    - cron: "*/15 1-5 * * 1-5"
  workflow_dispatch: {}   # 允許手動觸發，方便測試
jobs:
  intraday:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 簽出 repo
        uses: actions/checkout@v4
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安裝套件
        run: pip install requests pandas
      - name: 執行盤中即時更新
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py intraday
      - name: 把最新即時資料存回 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/latest.json
          git diff --staged --quiet || git commit -m "盤中即時更新 $(date +%Y-%m-%d' '%H:%M)"
          git fetch origin main
          git merge -X ours origin/main --no-edit || (git checkout --ours docs/data/ && git add docs/data/ && git commit --no-edit)
          git push origin HEAD:main
